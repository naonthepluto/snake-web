<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Змейка++</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
canvas { display: block; }
#nameWrap { position: relative; display: inline-block; }
#nameBox {
  display: none; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: #1c1c1c; border: 1px solid #555; border-radius: 10px;
  padding: 22px 28px; text-align: center; z-index: 10;
  font-family: Arial, sans-serif; min-width: 220px;
}
#nameBox p { color: #bbb; font-size: 14px; margin-bottom: 12px; }
#nameInput {
  font-size: 22px; font-weight: bold; width: 116px; text-align: center;
  background: #111; color: #fff; border: 2px solid #444; border-radius: 6px;
  padding: 4px 8px; letter-spacing: 6px; text-transform: uppercase;
  display: block; margin: 0 auto 14px;
}
#nameInput:focus { outline: none; border-color: #888; }
.nBtn {
  font-size: 14px; font-family: Arial, sans-serif;
  border-radius: 6px; padding: 7px 18px; cursor: pointer; border: 1px solid;
}
#nameOk   { background: #1a3a1a; color: #fff; border-color: #3a7a3a; margin-right: 8px; }
#nameSkip { background: #232323; color: #666; border-color: #3a3a3a; }
#gameWrap { display: flex; flex-direction: column; align-items: center; }
#dpad {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  grid-template-rows: repeat(3, 52px);
  gap: 3px;
  margin-top: 8px;
  user-select: none;
  -webkit-user-select: none;
}
.dp {
  background: #1e1e1e;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  color: #888;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: background .06s, color .06s, border-color .06s;
}
.dp:active { background: #2e2e2e; color: #ccc; border-color: #666; }
#btn-center {
  background: #181818;
  border: 1px solid #2a5a2a;
  border-radius: 8px;
  color: #4a8a4a;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: background .06s, color .06s;
}
#btn-center:active { background: #232323; }
</style>
</head>
<body>
<div id="gameWrap">
<div id="nameWrap">
  <canvas id="c"></canvas>
  <div id="nameBox">
    <p id="nameLabel"></p>
    <input id="nameInput" maxlength="5" spellcheck="false" autocomplete="off" />
    <div>
      <button class="nBtn" id="nameOk">OK</button>
      <button class="nBtn" id="nameSkip"></button>
    </div>
  </div>
</div>
<div id="dpad">
  <div></div>
  <button class="dp" id="btn-up">▲</button>
  <div></div>
  <button class="dp" id="btn-left">◀</button>
  <button id="btn-center">▶</button>
  <button class="dp" id="btn-right">▶</button>
  <div></div>
  <button class="dp" id="btn-down">▼</button>
  <div></div>
</div>
</div>
<script>
'use strict';

// ── constants ─────────────────────────────────────────────
const VERSION        = '2.01';
const CELL           = 20;
const COLS           = 30;
const ROWS           = 25;
const FIELD_W        = COLS * CELL;   // 600
const FIELD_H        = ROWS * CELL;   // 500
const PANEL_TOP      = 52;
const PANEL_BOTTOM   = 32;
const WIN_W          = FIELD_W;       // 600
const WIN_H          = PANEL_TOP + FIELD_H + PANEL_BOTTOM; // 584
const GAME_Y         = PANEL_TOP;     // 52
const SPEED_INIT     = 2.5;
const SPEED_MAX      = 12.3; // SPEED_INIT + 49 * SPEED_STEP (display 50)
const SPEED_STEP     = 0.2;
const SPEED_LERP     = 3;   // ед/с — скорость плавного нарастания
const STATUS_DUR     = 2500;
const ORANGE_DUR     = 3000;
const CELL_DUR       = 350;  // мс на одну клетку хвоста при анимации салата

// ── JSONBin.io ─────────────────────────────────────────────
const BIN_ID  = '6a25dd4bda38895dfe968750';
const BIN_KEY = '$2a$10$4gRMO6lr6GnyXIC62meoje.D3HJ6Zdjri1o1z34BM8EcgkUJoRJDO';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ── translations ──────────────────────────────────────────
const T = {
  ru: {
    title:    'ЗМЕЙКА++',
    start:    'ПРОБЕЛ / ENTER — начать',
    gameOver: 'ИГРА ОКОНЧЕНА',
    score:    'Счёт',
    speed:    'Скорость',
    pause:    'ПАУЗА',
    restart:  'R / ENTER — рестарт   •   Q — меню',
    author:   'Навайбкодил Лёша Карпич 5-б',
    ms:       'мс',
    status:   { apple: 'Восторг!', potato: 'Картошечка!', cake: 'Ой! Я съела нельзЮ..', salad: 'Разгрузочный день!' },
    stats:    { apple: 'Яблок', potato: 'Картошки', cake: 'Пирогов', salad: 'Салатов' },
    lb:       'Рекорды',
    lbEmpty:  '(пока пусто)',
    lbLoad:   'загрузка...',
    lbErr:    'недоступно',
    lbCols:   ['Инициалы', 'Очки', 'Длина'],
    enterName:'Введи инициалы (до 5 букв)',
    skip:     'Пропустить',
    noRank:   'Не попал в топ-100',
    rules: [
      { color: '#dc2828', name: 'Яблоко',   desc: '+1 очко, растёт' },
      { color: '#ffbe00', name: 'Картошка', desc: '+2 очка, замедляет на 3с' },
      { color: '#00c8ff', name: 'Пирог',    desc: '−5 очков, вырастает вдвое' },
      { color: '#a032dc', name: 'Салат',    desc: '+5 очков, укорачивает на ¼' },
    ],
    notes: ['Поле сферическое — выходишь за край, входишь с другой стороны', 'Врезаться в себя — конец игры'],
  },
  en: {
    title:    'SNAKE++',
    start:    'SPACE / ENTER — play',
    gameOver: 'GAME OVER',
    score:    'Score',
    speed:    'Speed',
    pause:    'PAUSE',
    restart:  'R / ENTER — restart   •   Q — menu',
    author:   'Vibe-coded by Lesha Karpich, 5-B',
    ms:       'ms',
    status:   { apple: 'Yummy!', potato: 'Potatoes!', cake: "Oops, shouldn't have..", salad: 'Diet day!' },
    stats:    { apple: 'Apples', potato: 'Potatoes', cake: 'Cakes', salad: 'Salads' },
    lb:       'Records',
    lbEmpty:  '(empty)',
    lbLoad:   'loading...',
    lbErr:    'unavailable',
    lbCols:   ['Name', 'Score', 'Length'],
    enterName:'Enter initials (up to 5 chars)',
    skip:     'Skip',
    noRank:   'Not in top 100',
    rules: [
      { color: '#dc2828', name: 'Apple',   desc: '+1 pt, grows' },
      { color: '#ffbe00', name: 'Potato',  desc: '+2 pts, slows for 3s' },
      { color: '#00c8ff', name: 'Cake',    desc: '−5 pts, doubles in length' },
      { color: '#a032dc', name: 'Salad',   desc: '+5 pts, shrinks by ¼' },
    ],
    notes: ['Spherical field — wrap around edges', 'Crash into yourself — game over'],
  },
};

const LB_W = 54, LB_H = 28, LB_GAP = 8;
const LB_RU_X = WIN_W / 2 - LB_W - LB_GAP / 2;
const LB_EN_X = WIN_W / 2 + LB_GAP / 2;
// button Y — two-column layout: title+gap+btns+gap+div+gap+MID(240)+gap+div+gap+prompt
const _BLK_H  = 52 + 12 + LB_H + 12 + 1 + 14 + 240 + 14 + 1 + 12 + 24; // 410
const LB_BTN_Y = Math.round((WIN_H - _BLK_H) / 2) + 52 + 12;

// ── canvas ────────────────────────────────────────────────
const canvas = document.getElementById('c');
canvas.width  = WIN_W;
canvas.height = WIN_H;
const ctx = canvas.getContext('2d');

// ── game state ────────────────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'gameover'
let snake, direction, dirQueue, food, orangePos, cakes;
let score, applesEaten, growPending, shrinkPending, nextOrangeAt, nextCakeAt, nextSaladAt;
let saladPos, cellAnims;
let speed, targetSpeed, status, orangeEffectStart, lastTickMs, paused, pauseMs;
let statApples, statPotatoes, statCakes, statSalads;
let finalLength = 0;
let blinkOn = true, blinkLast = 0;
let lang = 'ru';
let leaderboard = [], lbStatus = 'loading';
let playerRank = -1, playerName = '';

// ── helpers ───────────────────────────────────────────────
const ri = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
const eq = (a, b)  => a[0] === b[0] && a[1] === b[1];

function randomFood(occupied) {
  const set = new Set(occupied.map(p => p[0] + ',' + p[1]));
  let x, y;
  do { x = ri(0, COLS - 1); y = ri(0, ROWS - 1); } while (set.has(x + ',' + y));
  return [x, y];
}

// ── leaderboard API ──────────────────────────────────────
async function fetchLeaderboard() {
  lbStatus = 'loading';
  try {
    const r = await fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': BIN_KEY } });
    if (!r.ok) throw new Error(r.status);
    leaderboard = (await r.json()).record.scores || [];
    lbStatus = 'ok';
  } catch {
    leaderboard = [];
    lbStatus = 'error';
  }
}

async function submitScore(name) {
  const entry   = { name: name.toUpperCase().slice(0, 5), score, len: finalLength, date: new Date().toISOString().slice(0, 10) };
  const updated = [...leaderboard, entry].sort((a, b) => b.score - a.score).slice(0, 100);
  const idx     = updated.indexOf(entry);
  playerRank    = idx >= 0 ? idx + 1 : -1;
  playerName    = entry.name;
  try {
    await fetch(BIN_URL, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY },
      body:    JSON.stringify({ scores: updated }),
    });
    leaderboard = updated;
  } catch { /* offline — local only */ }
}

fetchLeaderboard();

// ── input ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (state === 'entry') return; // handled by HTML input
  if (state === 'start') {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); startGame(); }
    return;
  }
  if (state === 'gameover') {
    if (e.key === 'r' || e.key === 'R' || e.key === 'Enter') { e.preventDefault(); startGame(); }
    if (e.key === 'q' || e.key === 'Q' || e.key === 'Escape') { e.preventDefault(); state = 'start'; updateDpadUI(); }
    return;
  }
  if (state === 'playing') {
    e.preventDefault();
    const last  = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : direction;
    const [dx, dy] = last;
    const push = d => { if (dirQueue.length < 2) dirQueue.push(d); };
    if ((e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') && dy !==  1) push([ 0, -1]);
    if ((e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') && dy !== -1) push([ 0,  1]);
    if ((e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') && dx !==  1) push([-1,  0]);
    if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && dx !== -1) push([ 1,  0]);
    if (e.key === ' ') {
      const now = performance.now();
      paused = !paused;
      if (paused) pauseMs = now;
      else         lastTickMs = now; // сброс: без рывка при возобновлении
      updateDpadUI();
    }
  }
});

// ── name entry overlay ────────────────────────────────────
const nameBox   = document.getElementById('nameBox');
const nameLabel = document.getElementById('nameLabel');
const nameInput = document.getElementById('nameInput');
const nameOk    = document.getElementById('nameOk');
const nameSkip  = document.getElementById('nameSkip');

function showNameBox() {
  const L = T[lang];
  nameLabel.textContent = L.enterName;
  nameSkip.textContent  = L.skip;
  nameInput.value = '';
  nameBox.style.display = 'block';
  setTimeout(() => nameInput.focus(), 40);
}
function hideNameBox() { nameBox.style.display = 'none'; }

async function finishEntry(skip) {
  hideNameBox();
  if (!skip && nameInput.value.trim().length > 0) {
    await submitScore(nameInput.value.trim());
  } else {
    playerRank = -1;
  }
  state = 'gameover';
  updateDpadUI();
}

nameInput.addEventListener('keydown', async e => {
  if (e.key === 'Enter')  { e.preventDefault(); finishEntry(false); }
  if (e.key === 'Escape') { e.preventDefault(); finishEntry(true);  }
});
nameInput.addEventListener('input', () => {
  nameInput.value = nameInput.value.replace(/[^a-zA-Zа-яА-ЯёЁ0-9]/g, '').toUpperCase();
});
nameOk.addEventListener('click',   () => finishEntry(false));
nameSkip.addEventListener('click',  () => finishEntry(true));

canvas.addEventListener('click', e => {
  if (state !== 'start') return;
  const rect   = canvas.getBoundingClientRect();
  const mx     = (e.clientX - rect.left) * (WIN_W / rect.width);
  const my     = (e.clientY - rect.top)  * (WIN_H / rect.height);
  if (mx >= LB_RU_X && mx <= LB_RU_X + LB_W && my >= LB_BTN_Y && my <= LB_BTN_Y + LB_H) lang = 'ru';
  if (mx >= LB_EN_X && mx <= LB_EN_X + LB_W && my >= LB_BTN_Y && my <= LB_BTN_Y + LB_H) lang = 'en';
});

// ── D-pad controls ────────────────────────────────────────
function updateDpadUI() {
  const c = document.getElementById('btn-center');
  if (!c) return;
  if (state === 'start' || state === 'gameover') {
    c.textContent = '▶'; c.style.color = '#4a8a4a'; c.style.borderColor = '#2a5a2a';
  } else if (state === 'entry') {
    c.textContent = '—'; c.style.color = '#333'; c.style.borderColor = '#252525';
  } else if (paused) {
    c.textContent = '▶'; c.style.color = '#4a8a4a'; c.style.borderColor = '#2a5a2a';
  } else {
    c.textContent = '⏸'; c.style.color = '#555'; c.style.borderColor = '#303030';
  }
}

function dpadDir(dx, dy) {
  if (state !== 'playing' || paused) return;
  const last = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : direction;
  if (last[0] + dx === 0 && last[1] + dy === 0) return;
  if (dirQueue.length < 2) dirQueue.push([dx, dy]);
}

function dpadCenter() {
  if (state === 'start' || state === 'gameover') { startGame(); return; }
  if (state !== 'playing') return;
  const now = performance.now();
  paused = !paused;
  if (paused) pauseMs = now;
  else        lastTickMs = now;
  updateDpadUI();
}

(function bindDpad() {
  const dirs = [
    ['btn-up',     0, -1],
    ['btn-down',   0,  1],
    ['btn-left',  -1,  0],
    ['btn-right',  1,  0],
  ];
  for (const [id, dx, dy] of dirs) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); dpadDir(dx, dy); }, { passive: false });
    el.addEventListener('click', () => dpadDir(dx, dy));
  }
  const bc = document.getElementById('btn-center');
  bc.addEventListener('touchstart', e => { e.preventDefault(); dpadCenter(); }, { passive: false });
  bc.addEventListener('click', dpadCenter);
})();

// ── game init ─────────────────────────────────────────────
function startGame() {
  state            = 'playing';
  snake            = [[COLS >> 1, ROWS >> 1]];
  direction        = [1, 0];
  dirQueue         = [];
  food             = randomFood(snake);
  orangePos        = null;
  cakes            = [];
  saladPos         = null;
  cellAnims        = [];
  score            = 0;
  applesEaten      = 0;
  playerRank       = -1;
  playerName       = '';
  finalLength      = 0;
  statApples       = 0;
  statPotatoes     = 0;
  statCakes        = 0;
  statSalads       = 0;
  growPending      = 0;
  shrinkPending    = 0;
  nextOrangeAt     = ri(2, 4);
  nextCakeAt       = ri(5, 9);
  nextSaladAt      = ri(9, 13);
  speed            = SPEED_INIT;
  targetSpeed      = SPEED_INIT;
  status           = null;
  orangeEffectStart = null;
  lastTickMs       = performance.now();
  paused           = false;
  pauseMs          = 0;
  updateDpadUI();
}

// ── draw primitives ───────────────────────────────────────
function rRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);   ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);   ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x, y + r);       ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

function drawBox(x, y, w, h) {
  rRect(x, y, w, h, 5);
  ctx.fillStyle   = 'rgb(28,28,28)'; ctx.fill();
  ctx.strokeStyle = 'rgb(90,90,90)'; ctx.lineWidth = 1; ctx.stroke();
}

function drawGrid() {
  ctx.strokeStyle = 'rgb(40,40,40)'; ctx.lineWidth = 1;
  for (let x = 0; x < FIELD_W; x += CELL) {
    ctx.beginPath(); ctx.moveTo(x, GAME_Y); ctx.lineTo(x, GAME_Y + FIELD_H); ctx.stroke();
  }
  for (let y = 0; y < FIELD_H; y += CELL) {
    ctx.beginPath(); ctx.moveTo(0, GAME_Y + y); ctx.lineTo(FIELD_W, GAME_Y + y); ctx.stroke();
  }
}

function drawSnake() {
  for (let i = 0; i < snake.length; i++) {
    const [cx, cy] = snake[i];
    rRect(cx * CELL + 1, GAME_Y + cy * CELL + 1, CELL - 2, CELL - 2, 4);
    ctx.fillStyle = i === 0 ? 'rgb(0,140,0)' : 'rgb(0,200,0)';
    ctx.fill();
  }
}

function drawEll(cx, cy, color) {
  ctx.beginPath();
  ctx.ellipse(cx * CELL + CELL / 2, GAME_Y + cy * CELL + CELL / 2,
              (CELL - 4) / 2, (CELL - 4) / 2, 0, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
}

// ── status animation ──────────────────────────────────────
function lerp3(dark, base, p) {
  if (p <= 0.5) {
    const t = p * 2;
    return [dark[0] + (base[0] - dark[0]) * t,
            dark[1] + (base[1] - dark[1]) * t,
            dark[2] + (base[2] - dark[2]) * t];
  }
  const t = (p - 0.5) * 2;
  return [base[0] + (255 - base[0]) * t,
          base[1] + (255 - base[1]) * t,
          base[2] + (255 - base[2]) * t];
}

function drawStatusAnim(cx, cy, elapsed, text, base) {
  if (elapsed >= STATUS_DUR) return;
  const dark = [base[0] / 4, base[1] / 4, base[2] / 4];
  let scale, col, alpha;

  if (elapsed < 500) {
    const p = elapsed / 500;
    scale = 0.4 + 0.6 * p;
    col   = lerp3(dark, base, p);
    alpha = 1;
  } else if (elapsed < 1500) {
    const p   = (elapsed - 500) / 1000;
    const osc = (Math.sin(p * Math.PI * 5) + 1) / 2;
    scale = 1;
    col   = lerp3(dark, base, 0.5 + 0.5 * osc);
    alpha = 1;
  } else {
    const p = (elapsed - 1500) / 1000;
    const k = 1 - p;
    scale = 1;
    col   = lerp3(dark, base, k);
    alpha = k;
    if (alpha < 5 / 255) return;
  }

  const [r, g, b] = col.map(Math.round);
  ctx.save();
  ctx.globalAlpha   = alpha;
  ctx.font          = `bold ${Math.round(22 * scale)}px Arial`;
  ctx.fillStyle     = `rgb(${r},${g},${b})`;
  ctx.textBaseline  = 'middle';
  ctx.textAlign     = 'center';
  ctx.fillText(text, cx, cy);
  ctx.restore();
}

// ── HUD ───────────────────────────────────────────────────
function drawHUD(now) {
  const eff = orangeEffectStart !== null ? speed * 2 / 3 : speed;

  // top panel background + separator
  ctx.fillStyle = 'rgb(18,18,18)';
  ctx.fillRect(0, 0, WIN_W, PANEL_TOP);
  ctx.strokeStyle = 'rgb(90,90,90)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, PANEL_TOP - 1); ctx.lineTo(WIN_W, PANEL_TOP - 1); ctx.stroke();

  const bh = PANEL_TOP - 14; // 38
  const by = 7;

  // score box (left)
  ctx.font = 'bold 22px Arial';
  const sTxt = `${T[lang].score}:  ${score}`;
  const bw1  = ctx.measureText(sTxt).width + 22;
  drawBox(8, by, bw1, bh);
  ctx.fillStyle = '#fff'; ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.fillText(sTxt, 19, by + bh / 2);

  // speed box (right)
  const dispSpd = s => Math.max(1, Math.min(50, Math.round(1 + (s - SPEED_INIT) / SPEED_STEP)));
  ctx.font = '13px Arial';
  const spTxt = `${T[lang].speed}:  ${dispSpd(eff)}`;
  const bw2   = ctx.measureText(spTxt).width + 22;
  const bx2   = WIN_W - bw2 - 8;
  drawBox(bx2, by, bw2, bh);
  if (orangeEffectStart !== null) {
    const rem    = Math.max(0, ORANGE_DUR - (now - orangeEffectStart));
    const tmrTxt = `${Math.round(rem)} ${T[lang].ms}`;
    const mid    = by + bh / 2;
    ctx.font = '13px Arial';
    ctx.fillStyle = '#fff'; ctx.textBaseline = 'bottom'; ctx.textAlign = 'left';
    ctx.fillText(spTxt, bx2 + 11, mid - 1);
    ctx.fillStyle = 'rgb(255,190,0)'; ctx.textBaseline = 'top'; ctx.textAlign = 'center';
    ctx.fillText(tmrTxt, bx2 + bw2 / 2, mid + 1);
  } else {
    ctx.fillStyle = '#fff'; ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    ctx.fillText(spTxt, bx2 + 11, by + bh / 2);
  }

  // status box (center)
  let stW;
  if (status !== null) {
    ctx.font = 'bold 22px Arial';
    stW = ctx.measureText(T[lang].status[status.key]).width + 28;
  } else {
    stW = 120;
  }
  const stX = (WIN_W - stW) / 2;
  drawBox(stX, by, stW, bh);
  if (status !== null) {
    drawStatusAnim(stX + stW / 2, by + bh / 2, now - status.start, T[lang].status[status.key], status.color);
  }

  // bottom panel
  ctx.fillStyle = 'rgb(18,18,18)';
  ctx.fillRect(0, GAME_Y + FIELD_H, WIN_W, PANEL_BOTTOM);
  ctx.strokeStyle = 'rgb(90,90,90)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, GAME_Y + FIELD_H); ctx.lineTo(WIN_W, GAME_Y + FIELD_H); ctx.stroke();

  ctx.font = '13px Arial';
  const aTxt = `${T[lang].title}  •  ${T[lang].author}  •  v${VERSION}`;
  const aW   = ctx.measureText(aTxt).width + 20;
  const aH   = PANEL_BOTTOM - 8;
  const aX   = (WIN_W - aW) / 2;
  const aY   = GAME_Y + FIELD_H + 4;
  drawBox(aX, aY, aW, aH);
  ctx.fillStyle = 'rgb(90,90,90)'; ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.fillText(aTxt, aX + 10, aY + aH / 2);
}

// ── grayscale for pause ───────────────────────────────────
function grayscale() {
  const img = ctx.getImageData(0, 0, WIN_W, WIN_H);
  const d   = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
    d[i] = d[i + 1] = d[i + 2] = g;
  }
  ctx.putImageData(img, 0, 0);
}

// ── game logic ────────────────────────────────────────────
function update(now) {
  if (state !== 'playing' || paused) return;

  // снять эффект картошки по истечении
  if (orangeEffectStart !== null && now - orangeEffectStart >= ORANGE_DUR)
    orangeEffectStart = null;

  const eff = orangeEffectStart !== null ? speed * 2 / 3 : speed;
  if (now - lastTickMs < 1000 / eff) return;
  lastTickMs = now;

  if (dirQueue.length > 0) direction = dirQueue.shift();
  const hx = (snake[0][0] + direction[0] + COLS) % COLS;
  const hy = (snake[0][1] + direction[1] + ROWS) % ROWS;

  // сама себя
  if (snake.some(s => eq(s, [hx, hy]))) {
    finalLength = snake.length;
    state = 'entry';
    showNameBox();
    updateDpadUI();
    return;
  }

  const preLen = snake.length;
  snake.unshift([hx, hy]);

  if (eq([hx, hy], food)) {
    // ── Яблоко ──────────────────────────────────────────
    score++;
    applesEaten++;
    const occ = () => [...snake, ...(orangePos ? [orangePos] : []), ...cakes, ...(saladPos ? [saladPos] : [])];
    food  = randomFood([...occ(), food]);
    targetSpeed = Math.min(targetSpeed + SPEED_STEP, SPEED_MAX);
    status = { start: now, key: 'apple', color: [220, 40, 40] };
    statApples++;
    if (applesEaten === nextOrangeAt) {
      orangePos    = randomFood([...snake, food, ...cakes, ...(saladPos ? [saladPos] : [])]);
      nextOrangeAt = applesEaten + ri(2, 4);
    }
    if (applesEaten === nextCakeAt) {
      cakes.push(randomFood([...snake, food, ...(orangePos ? [orangePos] : []), ...cakes, ...(saladPos ? [saladPos] : [])]));
      nextCakeAt = applesEaten + ri(5, 9);
    }
    if (applesEaten === nextSaladAt) {
      saladPos    = randomFood([...snake, food, ...(orangePos ? [orangePos] : []), ...cakes]);
      nextSaladAt = applesEaten + ri(9, 13);
    }
    // хвост не удаляем → рост на 1

  } else if (orangePos !== null && eq([hx, hy], orangePos)) {
    // ── Картошка ────────────────────────────────────────
    score += 2;
    orangePos         = null;
    orangeEffectStart = now;
    targetSpeed = Math.min(targetSpeed + SPEED_STEP, SPEED_MAX);
    status = { start: now, key: 'potato', color: [210, 150, 0] };
    statPotatoes++;
    // хвост не удаляем → рост на 1

  } else if (cakes.some(c => eq(c, [hx, hy]))) {
    // ── Пирог ───────────────────────────────────────────
    cakes       = cakes.filter(c => !eq(c, [hx, hy]));
    score      -= 5;
    growPending += Math.max(0, preLen - 1); // вырасти до 2×preLen
    targetSpeed = Math.min(targetSpeed + SPEED_STEP, SPEED_MAX);
    status = { start: now, key: 'cake', color: [0, 190, 235] };
    statCakes++;

  } else if (saladPos !== null && eq([hx, hy], saladPos)) {
    // ── Салат ───────────────────────────────────────────
    saladPos = null;
    snake.pop(); // без роста
    const shrinkBy = Math.max(0, Math.min(Math.floor(snake.length / 4), snake.length - 2));
    shrinkPending += shrinkBy; // хвост убирается по одной клетке в каждом тике
    score += 5;
    status = { start: now, key: 'salad', color: [160, 50, 220] };
    statSalads++;

  } else {
    // ── Обычный ход ─────────────────────────────────────
    if (growPending > 0) growPending--;
    else                 snake.pop();
    // убираем одну клетку хвоста с анимацией, если нужно укоротиться
    if (shrinkPending > 0 && snake.length > 1) {
      cellAnims.push({ pos: snake[snake.length - 1], start: now });
      snake.pop();
      shrinkPending--;
    }
  }
}

// ── render ────────────────────────────────────────────────
function render(now) {
  if (state === 'start') {
    if (now - blinkLast >= 550) { blinkOn = !blinkOn; blinkLast = now; }

    // solid dark background — no grid
    ctx.fillStyle = '#151515'; ctx.fillRect(0, 0, WIN_W, WIN_H);

    const L  = T[lang];
    const cx = WIN_W / 2;

    // Column geometry
    const LC_X = 16, LC_W = 300;
    const RC_X = 324, RC_W = 260;
    const DIV_X = LC_X + LC_W + 4;

    // Centered vertical block
    const TITLE_H = 52, MID_H = 240;
    const blockH  = TITLE_H + 12 + LB_H + 12 + 1 + 14 + MID_H + 14 + 1 + 12 + 24;
    const sy      = Math.round((WIN_H - blockH) / 2);
    let y = sy;

    // Title
    ctx.textBaseline = 'top'; ctx.textAlign = 'center';
    ctx.font = 'bold 44px Arial'; ctx.fillStyle = 'rgb(0,210,0)';
    ctx.fillText(L.title, cx, y);
    y += TITLE_H + 12;

    // language buttons (centered)
    const drawLB = (x, label, active) => {
      rRect(x, y, LB_W, LB_H, 6);
      ctx.fillStyle   = active ? 'rgb(0,120,0)'  : 'rgb(26,26,26)'; ctx.fill();
      ctx.strokeStyle = active ? 'rgb(0,200,0)'  : 'rgb(80,80,80)'; ctx.lineWidth = 1; ctx.stroke();
      ctx.font = 'bold 14px Arial'; ctx.fillStyle = active ? '#fff' : 'rgb(100,100,100)';
      ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
      ctx.fillText(label, x + LB_W / 2, y + LB_H / 2);
    };
    drawLB(LB_RU_X, 'RU', lang === 'ru');
    drawLB(LB_EN_X, 'EN', lang === 'en');
    y += LB_H + 12;

    // Top divider
    ctx.strokeStyle = 'rgb(55,55,55)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(LC_X, y); ctx.lineTo(RC_X + RC_W, y); ctx.stroke();
    y += 1 + 14;

    const midY = y;

    // ── Left col: food rules ──────────────────────────────
    const dotR  = 7, rowH = 34;
    const dotX  = LC_X + 16 + dotR;
    const textX = dotX + dotR + 8;

    rRect(LC_X + 4, midY - 4, LC_W - 6, L.rules.length * rowH + 14, 7);
    ctx.fillStyle = 'rgb(22,22,22)'; ctx.fill();
    ctx.strokeStyle = 'rgb(65,65,65)'; ctx.lineWidth = 1; ctx.stroke();

    for (let i = 0; i < L.rules.length; i++) {
      const { color, name, desc } = L.rules[i];
      const ry = midY + i * rowH + rowH / 2;
      ctx.beginPath(); ctx.arc(dotX, ry, dotR, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
      ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      ctx.font = 'bold 14px Arial'; ctx.fillStyle = '#f0f0f0';
      const nameStr = name + ':';
      ctx.fillText(nameStr, textX, ry);
      const nw = ctx.measureText(nameStr).width;
      ctx.font = '13px Arial'; ctx.fillStyle = 'rgb(148,148,148)';
      ctx.fillText('  ' + desc, textX + nw, ry);
    }

    // Notes box with word-wrap
    const notesBoxX  = LC_X + 4;
    const notesBoxW  = LC_W - 6;
    const noteInnerW = notesBoxW - 18;
    const noteLH = 15, notePad = 7;
    ctx.font = '12px Arial';
    const wrapLines = txt => {
      const words = txt.split(' '), lines = [];
      let line = '';
      for (const w of words) {
        const t = line ? line + ' ' + w : w;
        if (ctx.measureText(t).width > noteInnerW && line) { lines.push(line); line = w; }
        else line = t;
      }
      if (line) lines.push(line);
      return lines;
    };
    const notesY0  = midY + L.rules.length * rowH + 8;
    const allLines = L.notes.flatMap(n => wrapLines('• ' + n));
    const notesBoxH = allLines.length * noteLH + notePad * 2;
    rRect(notesBoxX, notesY0, notesBoxW, notesBoxH, 6);
    ctx.fillStyle = 'rgb(20,20,20)'; ctx.fill();
    ctx.strokeStyle = 'rgb(55,55,55)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.font = '12px Arial'; ctx.fillStyle = 'rgb(132,132,132)';
    ctx.textBaseline = 'top'; ctx.textAlign = 'left';
    for (let i = 0; i < allLines.length; i++) {
      ctx.fillText(allLines[i], notesBoxX + 9, notesY0 + notePad + i * noteLH);
    }

    // Vertical divider
    ctx.strokeStyle = 'rgb(45,45,45)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(DIV_X, midY - 6); ctx.lineTo(DIV_X, midY + MID_H); ctx.stroke();

    // ── Right col: leaderboard ────────────────────────────
    const rcCx = RC_X + RC_W / 2;
    ctx.font = 'bold 14px Arial'; ctx.fillStyle = 'rgb(190,190,190)';
    ctx.textBaseline = 'top'; ctx.textAlign = 'center';
    ctx.fillText(L.lb, rcCx, midY);
    ctx.strokeStyle = 'rgb(55,55,55)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(RC_X + 4, midY + 18); ctx.lineTo(RC_X + RC_W - 4, midY + 18); ctx.stroke();

    // Column headers
    const [colN, colS, colL] = L.lbCols;
    ctx.font = '10px Arial'; ctx.fillStyle = 'rgb(72,72,72)'; ctx.textBaseline = 'top';
    ctx.textAlign = 'left';  ctx.fillText(colN, RC_X + 27,        midY + 22);
    ctx.textAlign = 'right'; ctx.fillText(colS, RC_X + RC_W - 36, midY + 22);
    ctx.textAlign = 'right'; ctx.fillText(colL, RC_X + RC_W - 2,  midY + 22);
    ctx.strokeStyle = 'rgb(40,40,40)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(RC_X + 4, midY + 34); ctx.lineTo(RC_X + RC_W - 4, midY + 34); ctx.stroke();

    const entryY0 = midY + 38, entryH = 16;
    const top10   = leaderboard.slice(0, 10);
    if (lbStatus === 'loading') {
      ctx.font = '12px Arial'; ctx.fillStyle = 'rgb(70,70,70)';
      ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
      ctx.fillText(L.lbLoad, rcCx, entryY0 + 50);
    } else if (lbStatus === 'error') {
      ctx.font = '12px Arial'; ctx.fillStyle = 'rgb(100,60,60)';
      ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
      ctx.fillText(L.lbErr, rcCx, entryY0 + 50);
    } else if (top10.length === 0) {
      ctx.font = '12px Arial'; ctx.fillStyle = 'rgb(70,70,70)';
      ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
      ctx.fillText(L.lbEmpty, rcCx, entryY0 + 50);
    } else {
      for (let i = 0; i < top10.length; i++) {
        const { name: nm, score: sc, len: ln } = top10[i];
        const ey   = entryY0 + i * entryH + entryH / 2;
        const isMe = playerRank === i + 1 && playerName === nm;
        if (isMe) {
          rRect(RC_X + 3, ey - entryH / 2 + 1, RC_W - 6, entryH - 1, 3);
          ctx.fillStyle = 'rgb(0,70,0)'; ctx.fill();
        }
        const hi  = isMe ? 'rgb(140,230,140)' : 'rgb(90,90,90)';
        const txt = isMe ? '#fff'              : 'rgb(200,200,200)';
        const dim = isMe ? 'rgb(100,180,100)'  : 'rgb(95,95,95)';
        ctx.font = isMe ? 'bold 11px Arial' : '11px Arial';
        ctx.textBaseline = 'middle';
        // rank
        ctx.fillStyle = hi;  ctx.textAlign = 'right';
        ctx.fillText(`${i + 1}.`, RC_X + 22, ey);
        // name
        ctx.fillStyle = txt; ctx.textAlign = 'left';
        ctx.fillText(nm, RC_X + 27, ey);
        // score
        ctx.fillStyle = hi;  ctx.textAlign = 'right';
        ctx.fillText(sc, RC_X + RC_W - 36, ey);
        ctx.fillStyle = dim; ctx.textAlign = 'right';
        ctx.fillText(ln != null ? ln : '', RC_X + RC_W - 2, ey);
      }
    }

    // ── Bottom ────────────────────────────────────────────
    y = midY + MID_H + 14;
    ctx.strokeStyle = 'rgb(55,55,55)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(LC_X, y); ctx.lineTo(RC_X + RC_W, y); ctx.stroke();
    y += 1 + 12;

    if (blinkOn) {
      ctx.font = 'bold 18px Arial'; ctx.fillStyle = '#e8e8e8';
      ctx.textBaseline = 'top'; ctx.textAlign = 'center';
      ctx.fillText(L.start, cx, y);
    }

    ctx.font = '11px Arial'; ctx.fillStyle = 'rgb(65,65,65)';
    ctx.textBaseline = 'bottom'; ctx.textAlign = 'right';
    ctx.fillText('v' + VERSION, WIN_W - 8, WIN_H - 6);

    return;
  }

  if (state === 'gameover' || state === 'entry') {
    const L  = T[lang];
    const cx = WIN_W / 2;

    ctx.fillStyle = '#151515'; ctx.fillRect(0, 0, WIN_W, WIN_H);

    // title
    ctx.textBaseline = 'top'; ctx.textAlign = 'center';
    ctx.font = 'bold 48px Arial'; ctx.fillStyle = 'rgb(220,40,40)';
    ctx.fillText(L.gameOver, cx, 70);

    // score box
    ctx.font = 'bold 26px Arial';
    const sTxt = `${L.score}: ${score}`;
    const sW   = ctx.measureText(sTxt).width + 48;
    const sX   = cx - sW / 2;
    const sY   = 142;
    const sH   = 46;
    rRect(sX, sY, sW, sH, 8);
    ctx.fillStyle = 'rgb(18,22,18)'; ctx.fill();
    ctx.strokeStyle = 'rgb(80,100,80)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    ctx.fillText(sTxt, cx, sY + sH / 2);

    // stats card
    const items = [
      { key: 'apple',  color: '#dc2828', count: statApples   },
      { key: 'potato', color: '#ffbe00', count: statPotatoes },
      { key: 'cake',   color: '#00c8ff', count: statCakes    },
      { key: 'salad',  color: '#a032dc', count: statSalads   },
    ];
    const cols = 2, rows = 2, cellW = 220, cellH = 38;
    const gridW = cols * cellW, gridH = rows * cellH;
    const gridX = cx - gridW / 2, gridY = 216;

    rRect(gridX - 12, gridY - 10, gridW + 24, gridH + 20, 8);
    ctx.fillStyle = 'rgb(22,22,22)'; ctx.fill();
    ctx.strokeStyle = 'rgb(70,70,70)'; ctx.lineWidth = 1; ctx.stroke();

    for (let i = 0; i < items.length; i++) {
      const { key, color, count } = items[i];
      const col = i % cols, row = Math.floor(i / cols);
      const ix  = gridX + col * cellW + cellW / 2;
      const iy  = gridY + row * cellH + cellH / 2;
      const dotR = 6;
      const label = L.stats[key] + ': ' + count;
      ctx.font = '15px Arial';
      const tw = ctx.measureText(label).width;
      const rowW = dotR * 2 + 8 + tw;
      const lx = ix - rowW / 2;
      ctx.beginPath(); ctx.arc(lx + dotR, iy, dotR, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
      ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      ctx.fillStyle = '#ccc';
      ctx.fillText(label, lx + dotR * 2 + 8, iy);
    }

    // rank
    const rankY = gridY + gridH + 14;
    if (state === 'gameover' && playerRank > 0) {
      ctx.font = 'bold 14px Arial'; ctx.fillStyle = 'rgb(80,200,80)';
      ctx.textBaseline = 'top'; ctx.textAlign = 'center';
      const rankTxt = lang === 'ru'
        ? `Ты #${playerRank} в таблице рекордов!`
        : `You're #${playerRank} on the leaderboard!`;
      ctx.fillText(rankTxt, cx, rankY);
    } else if (state === 'gameover' && playerRank === -1 && playerName === '') {
      ctx.font = '13px Arial'; ctx.fillStyle = 'rgb(80,80,80)';
      ctx.textBaseline = 'top'; ctx.textAlign = 'center';
      ctx.fillText(L.noRank, cx, rankY);
    }

    // hint — only after name entry
    if (state === 'gameover') {
      ctx.font = '13px Arial'; ctx.fillStyle = 'rgb(75,85,75)';
      ctx.textBaseline = 'top'; ctx.textAlign = 'center';
      ctx.fillText(L.restart, cx, rankY + 26);
    }

    return;
  }

  // playing
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, WIN_W, WIN_H);
  drawGrid();
  drawEll(food[0], food[1], 'rgb(220,40,40)');
  if (orangePos) drawEll(orangePos[0], orangePos[1], 'rgb(255,190,0)');
  for (const [cx, cy] of cakes) drawEll(cx, cy, 'rgb(0,200,255)');
  if (saladPos) drawEll(saladPos[0], saladPos[1], 'rgb(160,50,220)');
  drawSnake();

  for (const anim of cellAnims) {
    const cel = now - anim.start;
    if (cel < 0 || cel >= CELL_DUR) continue;
    let r, g, b, alpha;
    if (cel < 60) {
      r = 255; g = 255; b = 255; alpha = 1;               // белая вспышка
    } else if (cel < 140) {
      const t = (cel - 60) / 80;                          // белый → зелёный
      r = Math.round(255 * (1 - t));
      g = Math.round(255 * (1 - t) + 200 * t);
      b = Math.round(255 * (1 - t));
      alpha = 1;
    } else {
      r = 0; g = 200; b = 0;                              // зелёный → прозрачный
      alpha = Math.max(0, 1 - (cel - 140) / 210);
    }
    if (alpha <= 0) continue;
    const [cx, cy] = anim.pos;
    ctx.save();
    ctx.globalAlpha = alpha;
    rRect(cx * CELL + 1, GAME_Y + cy * CELL + 1, CELL - 2, CELL - 2, 4);
    ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.fill();
    ctx.restore();
  }
  cellAnims = cellAnims.filter(a => now - a.start < CELL_DUR);

  drawHUD(now);

  if (paused) {
    grayscale();
    const t  = (now - pauseMs) / 1000;
    const k  = (Math.sin(t * Math.PI * 1.5) + 1) / 2; // ~0.75 Гц
    const br = Math.round(130 + 125 * k);
    ctx.font = 'bold 48px Arial';
    ctx.fillStyle    = `rgb(${br},${br},${br})`;
    ctx.textBaseline = 'middle';
    ctx.textAlign    = 'center';
    ctx.fillText(T[lang].pause, WIN_W / 2, WIN_H / 2);
  }
}

// ── main loop ─────────────────────────────────────────────
let prevLoopTs = 0;
function loop(ts) {
  if (state === 'playing' && !paused && prevLoopTs > 0) {
    const dt   = (ts - prevLoopTs) / 1000;
    const diff = targetSpeed - speed;
    const step = SPEED_LERP * dt;
    speed = Math.abs(diff) <= step ? targetSpeed : speed + Math.sign(diff) * step;
  }
  prevLoopTs = ts;
  update(ts);
  render(ts);
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
